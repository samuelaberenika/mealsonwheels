<!DOCTYPE html>
<html>
<head>
  <title class="title">Food Vendor Form</title>
  <link rel="stylesheet" href="/static/Foodvendor.css"> <!-- Link to your custom CSS file -->
</head>
<body>


  <button class="hbutton" id="hbutton">Home </button>
  <button class="donorbutton" id="donorbutton">Donor Form</button>
  <button class="logisticsbutton" id="logisticsbutton">Logistics Form</button>

  <script>
      // Get references to the buttons
      const button1 = document.getElementById('donorbutton');
      const button3 = document.getElementById('logisticsbutton');
      const button2 = document.getElementById('hbutton');

      // Add event listeners to the buttons
      button2.addEventListener('click', () => {
            window.location.href = 'HomePage.html'; // Replace 'page1.html' with the actual file path of the first webpage
        });

      button1.addEventListener('click', () => {
          window.location.href = 'DonorApp.html'; // Replace 'page1.html' with the actual file path of the first webpage
      });

      button3.addEventListener('click', () => {
          window.location.href = 'Logistics.html'; // Replace 'page3.html' with the actual file path of the third webpage
      });
  </script>

  <div class="form-center"> <!-- Add a container to center the form -->
    <h1 class="title">Food Vendor Information Form</h1>
    <form id="vendorForm" class="form-container">
      <!-- Existing rows -->
      <div class="form-row">
        <label for="businessName" class="form-label">Business Name</label>
        <input type="text" name="businessName[]" id="businessName" class="form-input" required>
      </div>

      <div class="form-row">
        <label for="contactPerson" class="form-label">Contact Person</label>
        <input type="text" name="contactPerson[]" id="contactPerson" class="form-input" required>
      </div>

      <div class="form-row">
        <label for="contactEmail" class="form-label">Contact Email</label>
        <input type="email" name="contactEmail[]" id="contactEmail" class="form-input" required>
      </div>

      <div class="form-row">
        <label for="contactPhone" class="form-label">Contact Phone No.</label>
        <input type="text" name="contactPhone[]" id="contactPhone" class="form-input" required>
      </div>

      <div class="form-row">
        <label for="businessAddress" class="form-label">Business Address</label>
        <input type="text" name="businessAddress[]" id="businessAddress" class="form-input" required>
      </div>

      <div class="form-row">
        <label for="businessWebsite" class="form-label">Business Website</label>
        <input type="url" name="businessWebsite[]" id="businessWebsite" class="form-input">
      </div>

      <div class="form-row">
        <label for="serviceToItems" class="form-label">Service to items</label>
        <input type="text" name="serviceToItems[]" id="serviceToItems" class="form-input" required>
      </div>

      <div class="form-row">
        <label for="other" class="form-label">Other</label>
        <input type="text" name="other[]" id="other" class="form-input">
      </div>
      <!-- End of form-container -->

      <div class="form-row">
        <button type="submit" class="form-button">Submit</button>
      </div>

      <div class="form-row form-checkbox-row">
        <label class="form-label">Approved</label>
        <label class="checkbox-container">
          <input type="checkbox" name="approved[]" value="yes" class="form-checkbox">
          <span class="checkmark"></span>
        </label>

      </div>
    </form>
  </div>
  
</body>
</html>
