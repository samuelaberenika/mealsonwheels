                <ul class="menu-links">

                <li class="mode">
                    <div class="sun-moon">
                        <i class='bx bx-moon icon moon'></i>

    </nav>

    <section class="home">
        <div class="text">Donor Application Form</div>
      
        <div class="container">
            
            <div class="content">
              <form method="POST" action="{{url_for('donor')}}">


                <div class="user-details">
                  <div class="input-box">
                    <span class="details">Full Name</span>
                    <input type="text" placeholder="Enter your name" required>
                  </div>


                  <div class="input-box">
                    <span class="details">Address</span>
                    <input type="text" placeholder="Enter your address" required>
                  </div>


                  <div class="input-box">
                    <span class="details">Email</span>
                    <input type="text" placeholder="Enter your email" required>
                  </div>


                  <div class="input-box">
                    <span class="details">Phone Number</span>
                    <input type="number" placeholder="Enter your number" required>
                  </div>



                  <div class="input-box">
                    <span class="details">Donation Method</span>
                    <select name="methodOfDonation[]" id="methodOfDonation" class="dropdown">
                      <option value="Church Collection">Cheque</option>
                      <option value="Direct Donation">Bank Transfer</option>
                      <option value="Direct Donation">Cash</option>
                    </select>
                  </div>



                  <div class="input-box">
                    <span class="details">Donation Tier</span>
                    <select name="donorTier[]" id="donorTier" class="dropdown">
                      <option value="Bronze">Bronze [0-100K NGN]</option>
                      <option value="Silver">Silver [100K-500K NGN]</option>
                      <option value="Gold">Gold [500K-1M NGN]</option>
                      <option value="Platinum">Platinum [1M-5M NGN]</option>
                    </select>
                  </div>
                </div>


                <div class="gender-details">
                  <input type="radio" name="gender" id="dot-1">
                  <input type="radio" name="gender" id="dot-2">
                  <input type="radio" name="gender" id="dot-3">
                  <span class="gender-title">Gender</span>
                  <div class="category">

                    <label for="dot-1">
                    <span class="dot one"></span>
                    <span class="gender">Male</span>
                  </label>

                  <label for="dot-2">
                    <span class="dot two"></span>
                    <span class="gender">Female</span>
                  </label>

                  <label for="dot-3">
                    <span class="dot three"></span>
                    <span class="gender">Prefer not to say</span>
                    </label>
                  </div>
                </div>

                <div class="button">
                  <input type="submit" value="Submit">
                </div>
              </form>
            </div>
          </div>
    </section>

    <script src="/static/Homepage.js"></script>
