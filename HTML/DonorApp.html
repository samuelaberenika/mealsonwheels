<!DOCTYPE html>
<html>
<head>
  <title class="title">Donor Application Form</title>
  <link rel="stylesheet" href="/static/DonorApp.css">
</head>
<body>



  <button class="hbutton" id="hbutton">Home </button>
  <button class="foodvendorbutton" id="foodvendorbutton">Vendor Form </button>
  <button class="logisticsbutton" id="logisticsbutton">Logistics Form</button>

  <script>
      // Get references to the buttons
      const button2 = document.getElementById('foodvendorbutton');
      const button3 = document.getElementById('logisticsbutton');
      const button1 = document.getElementById('hbutton');

      button1.addEventListener('click', () => {
            window.location.href = 'HomePage.html'; // Replace 'page1.html' with the actual file path of the first webpage
        });

      button2.addEventListener('click', () => {
          window.location.href = 'Foodvendor.html'; // Replace 'page2.html' with the actual file path of the second webpage
      });

      button3.addEventListener('click', () => {
          window.location.href = 'Logistics.html'; // Replace 'page3.html' with the actual file path of the third webpage
      });
  </script>


  <h1 class="title">Donor Application</h1>
  <form id="donorForm" class="form-container">
    <div class="form-row">
      <label for="name" class="form-label">Name</label>
      <input type="text" name="name[]" id="name" class="form-input" required>
    </div>

    <div class="form-row">
      <label for="contactEmail" class="form-label">Contact Email</label>
      <input type="email" name="contactEmail[]" id="contactEmail" class="form-input" required>
    </div>

    <div class="form-row">
      <label for="contactPhone" class="form-label">Contact Phone No</label>
      <input type="text" name="contactPhone[]" id="contactPhone" class="form-input" required>
    </div>

    <div class="form-row">
      <label for="address" class="form-label">Address</label>
      <input type="text" name="address[]" id="address" class="form-input" required>
    </div>

    <div class="form-row">
      <label for="donorTier" class="form-label">Donor Tier</label>
      <select name="donorTier[]" id="donorTier" class="form-input">
        <option value="Bronze">Bronze</option>
        <option value="Silver">Silver</option>
        <option value="Gold">Gold</option>
        <option value="Platinum">Platinum</option>
      </select>
    </div>

    <div class="form-row">
      <label for="donationAmount" class="form-label">Donation Amount</label>
      <input type="number" name="donationAmount[]" id="donationAmount" class="form-input" required>
    </div>

    <div class="form-row">
      <label for="methodOfDonation" class="form-label">Method of Donation</label>
      <select name="methodOfDonation[]" id="methodOfDonation" class="form-input">
        <option value="Church Collection">Church Collection</option>
        <option value="Direct Donation">Direct Donation</option>
      </select>
    </div>


    <button type="submit" class="form-button">Submit</button>
    
    <div class="form-row form-checkbox-row">
      <label class="form-label">Approved</label>
      <label class="checkbox-container">
        <input type="checkbox" name="approved[]" value="yes" class="form-checkbox">
        <span class="checkmark"></span>
      </label>
    </div>

  </form>


</body>
</html>
