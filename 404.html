<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — MealsOnWheels</title>
  <link rel="stylesheet" href="/css/main.css" />
  <style>
    body { min-height: 100vh; display: flex; flex-direction: column; }
    .notfound {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 4rem 2rem; text-align: center;
    }
    .notfound__inner { display: flex; flex-direction: column; align-items: center; gap: 1.25rem; max-width: 420px; }
    .notfound__code {
      font-family: var(--font-display);
      font-size: 6rem; font-weight: 600; line-height: 1;
      color: var(--ink-100);
    }
    .notfound__title { font-size: 1.5rem; font-weight: 600; }
    .notfound__desc  { font-size: 0.95rem; color: var(--ink-500); line-height: 1.7; }
  </style>
</head>
<body>
  <header class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-brand">
        <span class="nav-brand-mark">🍽️</span>
        MealsOnWheels
      </a>
    </div>
  </header>

  <main class="notfound">
    <div class="notfound__inner anim-fiu">
      <div class="notfound__code">404</div>
      <h1 class="notfound__title">Page not found</h1>
      <p class="notfound__desc">The page you're looking for doesn't exist or has been moved.</p>
      <a href="/" class="btn btn-primary btn-lg">Back to home</a>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-brand">🍽️ MealsOnWheels</div>
    </div>
  </footer>
</body>
</html>
