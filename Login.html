<!DOCTYPE html>

<html>
  <title>MealsonWheels Login</title>

<head>

    <link rel="stylesheet" href="/static/login.css">

</head>
<div class="login-box">
  <h2>Login</h2>

  <form method="POST" action="{{url_for('login')}}">

    <div class="user-box">
      
      <input  class="words" type="text" placeholder="Username" name="username" required="">
      <label>Username</label>
  
    </div>

    <div class="user-box">
      
      <input class="words" placeholder="Password"  type="password" name="password" required="">
      <label>Password</label>
    </div>
      
      <input id="submit" type="submit" value="login">
      <a href="{{ url_for('signup') }}" class="cancelbtn">Sign up</a> 
      
      
    </div>

  </form>
  </div>
  </html>
