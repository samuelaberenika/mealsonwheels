<!DOCTYPE html>
<html>
  <head>
    <title>
      MealsOnWheels
    </title>
    <link rel="stylesheet" href="/static/HomePage.css">
  </head>

  <body>

  

  
    <button class="donorbutton" id="donorbutton">Donor Form</button>
    <button class="foodvendorbutton" id="foodvendorbutton">Vendor Form </button>
    <button class="logisticsbutton" id="logisticsbutton">Logistics Form</button>
    <button class="logoutbutton" id="logoutbutton">Logout</button>
    

    <script>
        // Get references to the buttons
        const button1 = document.getElementById('donorbutton');
        const button2 = document.getElementById('foodvendorbutton');
        const button3 = document.getElementById('logisticsbutton');
        const button4 = document.getElementById('logoutbutton');

        // Adds event listeners to the buttons
        button1.addEventListener('click', () => {
            window.location.href = 'DonorApp.html'; 
        });

        button2.addEventListener('click', () => {
            window.location.href = 'Foodvendor.html'; 
        });

        button3.addEventListener('click', () => {
            window.location.href = 'navbar.html'; 
        });

        button4.addEventListener('click', () => {
          window.location.href = "{{url_for('logout')}}";
        });

        

    </script>
 



  </body>
</html>
